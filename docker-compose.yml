services:
  httpros:
    build: .
    container_name: httpros-server
    ports:
      - "50022:50022"
      - "80:80"
      - "443:443"
    volumes:
      # Unified Data Persistence
      - ./Data:/app/Data
    environment:
      - Settings__DataPath=Data
    restart: unless-stopped
    stdin_open: true
    tty: true
