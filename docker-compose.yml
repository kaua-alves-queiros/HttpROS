services:
  httpros:
    build: .
    container_name: httpros-server
    ports:
      - "50022:50022"
      - "80:80"
      - "443:443"
    volumes:
      # Persist configuration and state
      - ./proxy:/app/proxy
      - ./static:/app/static
      - ./redirect:/app/redirect
      - ./error-pages:/app/error-pages
      - ./certs:/app/certs
    restart: unless-stopped
    stdin_open: true # For interactive shells if needed
    tty: true
