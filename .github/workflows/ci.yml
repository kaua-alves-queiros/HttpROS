name: HttpROS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Assumes .NET 10 is available in actions

    - name: Restore Dependencies
      run: dotnet restore HttpROS.slnx

    - name: Build Solution
      run: dotnet build HttpROS.slnx --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test HttpROS.slnx --configuration Release --no-build --verbosity normal
